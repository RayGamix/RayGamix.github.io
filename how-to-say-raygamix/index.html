<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>How do I say RayGamix?</title>
        <link rel="icon" type="image/x-icon" href="https://raygamix.github.io/favicon.png">
        
        <style>
            * {
                box-sizing: border-box;
            }

            
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                font-family: Arial, sans-serif;
                background-color: #070a33;
                color: white;
                margin-top: 70px;
            }
            
            h1 {
           font-size:400%;
                font-weight: 700;
            }
            
            h3 {
                font-weight: 100;
                           font-size:400%;
            }
    button{
      margin-top: 15px;
      padding: 14px 22px;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      background: radial-gradient(circle at top left, #0ca, #775bff);
      text-align: center;
      width: 700px;
      transition: 1.25s ease;
    }
        button:hover, button.clicked{
      margin-top: 15px;
      padding: 14px 22px;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      background: radial-gradient(circle at top left, #097, #4428cc);
      text-align: center;
      width: 700px;
      transition: 0.1s ease;
    }
            </style>
            </head>
            
            <body>
                    <h1>How do i say RayGamix?</h1>
  <h2>(Ray-Game-Ix)</h2>
    <!-- Hidden audio element -->
    <audio id="myAudio">
        <source src="RayGamix.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Play/Pause button -->
    <button id="playBtn">Play</button>

    <script>
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playBtn');

        playBtn.addEventListener('click', () => {
            try {
                if (audio.paused) {
                    audio.play()
                        .then(() => {
                            playBtn.textContent = 'Play';
                        })
                        .catch(err => {
                            console.error('Audio play failed:', err);
                            alert('Unable to play audio. Check file path or browser settings.');
                        });
                } else {
                    audio.pause();
                    playBtn.textContent = 'Play';
                }
            } catch (error) {
                console.error('Error handling audio:', error);
            }
        });
    </script>
    <script>
    const btn = document.getElementById('myBtn');

    btn.addEventListener('click', () => {
        // Add the clicked class
        btn.classList.add('clicked');

        // Remove it after 1 second
        setTimeout(() => {
            btn.classList.remove('clicked');
        }, 2000);
    });
</script>
                </body>
                </html>
