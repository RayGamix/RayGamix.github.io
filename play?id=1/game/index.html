<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Obby - On RayGamix Launcher</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; }
        
        /* UI Overlay */
        #ui-layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle, #2c3e50, #000000); 
            z-index: 10; 
            transition: opacity 0.5s ease; 
        }
        
        #menu-title { color: #f1c40f; font-size: 4rem; text-shadow: 3px 3px #c0392b; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 5px; text-align: center; }
        
        #play-button { 
            padding: 15px 50px; 
            font-size: 1.5rem; 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 5px #1e8449; 
            transition: all 0.2s; 
        }
        #play-button:hover { background-color: #2ecc71; transform: translateY(-2px); }
        #play-button:active { transform: translateY(3px); box-shadow: 0 2px #1e8449; }
        
        #instructions { color: white; margin-top: 30px; font-size: 0.9rem; text-align: center; line-height: 1.6; padding: 0 20px; }
        
        #hud {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #f1c40f;
            font-size: 1.5rem;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 12px;
            z-index: 5;
            display: none;
            border: 2px solid #f1c40f;
        }

        #footer { position: absolute; bottom: 10px; color: rgba(255,255,255,0.5); font-size: 0.8rem; text-align: center; width: 100%; }
        
        .back-btn { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 100; 
            padding: 10px 20px;
            color: white; 
            background-color: #1133ff; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px #001fcc;
            transition: all 0.1s;
        }
        .back-btn:hover { background-color: #3355ff; transform: translateY(-1px); }
        .back-btn:active { transform: translateY(2px); box-shadow: 0 2px #001fcc; }

        /* Dev Menu & Auth Styles */
        #dev-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: #444;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 5px 10px;
            cursor: pointer;
            font-family: monospace;
            display: none;
        }

        #auth-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            border: 2px solid #0f0;
            padding: 20px;
            border-radius: 8px;
            color: white;
            text-align: center;
            z-index: 200;
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        #auth-modal input { padding: 10px; font-size: 1rem; border: none; outline: none; border-radius: 5px; }
        #auth-modal button { padding: 10px; font-size: 1rem; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        #auth-submit { background-color: #27ae60; color: white; }
        #auth-submit:hover { background-color: #2ecc71; }
        #auth-close { background-color: #c0392b; color: white; }
        #auth-close:hover { background-color: #e74c3c; }

        #dev-menu {
            position: absolute;
            top: 60px;
            right: 20px;
            width: 220px;
            background: rgba(0,0,0,0.95);
            color: white;
            padding: 15px;
            border: 2px solid #0f0;
            border-radius: 8px;
            display: none;
            z-index: 100;
            pointer-events: auto;
        }

        .dev-option {
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dev-option input { cursor: pointer; width: 20px; height: 20px; }
        .dev-header { margin-top:0; color:#0f0; border-bottom: 1px solid #0f0; padding-bottom: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <button onclick="window.location.href='https://raygamix.github.io/'" class="back-btn">Leave Game</button>
    <button id="dev-toggle">DEV</button>

    <!-- Custom GUI for Dev Login -->
    <div id="auth-modal">
        <h3 style="margin: 0; color: #0f0; font-family: monospace;">Developer Access</h3>
        <input type="password" id="auth-input" placeholder="Enter Secret Key">
        <p id="auth-error" style="color: #ff4444; margin: 0; font-size: 0.8rem; display: none;">Invalid Key!</p>
        <button id="auth-submit">Login</button>
        <button id="auth-close">Cancel</button>
    </div>

    <div id="dev-menu">
        <h3 class="dev-header">ADMIN CONSOLE</h3>
        <div class="dev-option">
            <label>God Mode</label>
            <input type="checkbox" id="god-mode">
        </div>
        <div class="dev-option">
            <label>Air Walk</label>
            <input type="checkbox" id="air-walk">
        </div>
        <p style="font-size: 0.7rem; color: #0f0; opacity: 0.7;">
            Key: 2026raygamixofficial...<br>
            Status: Authenticated
        </p>
    </div>

    <div id="ui-layer">
        <h1 id="menu-title">Basic Obby</h1>
        <button id="play-button">PLAY</button>
        <div id="instructions">
            Instructions: W/A/S/D to Move, Space to Jump, Mouse to Rotate Camera.
        </div>
        <div id="footer">Created by The RayGamix Team 2026 | We wish you a great playing Experience!</div>
    </div>

    <div id="hud">Level: 1</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        const clock = new THREE.Clock();
        let scene, camera, renderer;
        let isPlaying = false;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let platforms = [];
        let checkpoints = [];
        let lastCheckpointPos = new THREE.Vector3(0, 5, 0);
        let cameraAngleX = 0;
        let cameraAngleY = 0.3;
        let currentLevel = 1;

        // Dev Flags
        let isGodMode = false;
        let isAirWalk = false;

        let playerGroup = new THREE.Group();
        let idleModel, walkModel, jumpModel;
        let idleMixer, walkMixer, jumpMixer;
        let currentState = 'idle';
        
        const playerCollider = new THREE.Box3();
        // Collider adjusted for AGAIN 2x larger models!
        const colliderSize = new THREE.Vector3(3.2, 7.2, 3.2); 

        const PLAYER_SPEED = 18.0; // Increased speed for giant model
        const AIR_CONTROL = 0.85;
        const JUMP_FORCE = 25.0; // Increased jump to clear large gaps comfortably
        const GRAVITY = 45.0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 50, 800);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.4);
            sunLight.position.set(50, 200, 50);
            sunLight.castShadow = true;
            sunLight.shadow.camera.left = -400;
            sunLight.shadow.camera.right = 400;
            sunLight.shadow.camera.top = 400;
            sunLight.shadow.camera.bottom = -400;
            scene.add(sunLight);

            createObby();
            loadPlayer();
            setupDevMenu();

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', (e) => handleKey(e.code, true));
            document.addEventListener('keyup', (e) => handleKey(e.code, false));
            document.addEventListener('mousemove', onMouseMove);
            
            document.getElementById('play-button').onclick = () => {
                document.getElementById('ui-layer').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('ui-layer').style.display = 'none';
                    document.getElementById('hud').style.display = 'block';
                    document.getElementById('dev-toggle').style.display = 'block';
                    isPlaying = true;
                    document.body.requestPointerLock();
                }, 500);
            };

            animate();
        }

        function setupDevMenu() {
            const toggle = document.getElementById('dev-toggle');
            const menu = document.getElementById('dev-menu');
            const authModal = document.getElementById('auth-modal');
            const authInput = document.getElementById('auth-input');
            const authSubmit = document.getElementById('auth-submit');
            const authClose = document.getElementById('auth-close');
            const authError = document.getElementById('auth-error');
            
            const godInput = document.getElementById('god-mode');
            const airInput = document.getElementById('air-walk');

            // Open custom Auth GUI
            toggle.onclick = (e) => {
                e.stopPropagation();
                if (menu.style.display === 'block') {
                    menu.style.display = 'none'; // Close menu if already open
                    document.body.requestPointerLock();
                } else {
                    document.exitPointerLock();
                    authModal.style.display = 'flex';
                    authInput.value = '';
                    authError.style.display = 'none';
                    authInput.focus();
                }
            };

            // Process Authentication
            authSubmit.onclick = () => {
                if (authInput.value === "2026raygamixofficialkeydonottellothers") {
                    authModal.style.display = 'none';
                    menu.style.display = 'block';
                    authError.style.display = 'none';
                } else {
                    authError.style.display = 'block';
                }
            };

            // Close Auth GUI
            authClose.onclick = () => {
                authModal.style.display = 'none';
                document.body.requestPointerLock();
            };

            // Allow hitting "Enter" in the input field
            authInput.addEventListener("keyup", function(event) {
                if (event.key === "Enter") {
                    authSubmit.click();
                }
            });

            godInput.onchange = (e) => { 
                isGodMode = e.target.checked; 
                console.log("God Mode:", isGodMode);
            };
            
            airInput.onchange = (e) => { 
                isAirWalk = e.target.checked;
                console.log("Air Walk:", isAirWalk);
            };

            menu.onmousedown = (e) => e.stopPropagation();
            authModal.onmousedown = (e) => e.stopPropagation();
        }

        function createObby() {
            let lastPos = new THREE.Vector3(0, 0, 0);
            addPlatform(lastPos.x, lastPos.y - 0.5, lastPos.z, 40, 40, 0x2ecc71); // Bigger start platform

            const levelColors = [
                0xe74c3c, 0x9b59b6, 0x3498db, 0xf1c40f, 0xe67e22, 
                0x1abc9c, 0x34495e, 0xd35400, 0x7f8c8d, 0x2c3e50
            ];

            for (let l = 1; l <= 10; l++) {
                const cpPos = lastPos.clone();
                cpPos.z -= 20;
                addCheckpoint(cpPos.x, cpPos.y, cpPos.z, l);
                lastPos.copy(cpPos);

                for (let p = 0; p < 10; p++) {
                    let width = 8;
                    let depth = 8;
                    let type = 'static';
                    
                    if (l > 1) { width = 7.5; }
                    if (l > 3) { width = 7; depth = 7; }
                    if (l === 4) type = 'moving';
                    if (l === 6) type = 'spinning';
                    if (l === 7) type = 'disappearing';
                    if (l > 8) { width = 6; depth = 6; }
                    
                    const gap = l === 1 ? 12 : 14 + (Math.random() * 5);
                    lastPos.z -= gap;
                    lastPos.x += (Math.random() - 0.5) * (l * 3);
                    lastPos.y += (Math.random() - 0.2) * 2;

                    addPlatform(lastPos.x, lastPos.y, lastPos.z, width, depth, levelColors[l-1], type);
                }
                
                lastPos.z -= 20;
                addPlatform(lastPos.x, lastPos.y, lastPos.z, 20, 20, 0xffffff);
            }
        }

        function addPlatform(x, y, z, w, d, color, type = 'static') {
            const geo = new THREE.BoxGeometry(w, 1.5, d);
            const mat = new THREE.MeshStandardMaterial({ color: color, transparent: true });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            
            platforms.push({
                mesh: mesh,
                type: type,
                originalY: y,
                originalX: x,
                active: true,
                timer: Math.random() * Math.PI * 2
            });
        }

        function addCheckpoint(x, y, z, level) {
            const geo = new THREE.BoxGeometry(16, 0.4, 16);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            checkpoints.push({ mesh, level, active: false });
        }

        function loadPlayer() {
            const gltfLoader = new GLTFLoader();
            const fbxLoader = new FBXLoader();

            playerGroup.position.copy(lastCheckpointPos);
            scene.add(playerGroup);

            gltfLoader.load('https://raygamix.github.io/CHARACTER.glb', (gltf) => {
                idleModel = gltf.scene;
                // Updated Scale: 2.0 (2x of previous 1.0)
                idleModel.scale.set(2.0, 2.0, 2.0); 
                // Offset Idle specifically 2 units higher to account for doubling size
                idleModel.position.y = 2.0; 
                idleModel.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
                idleMixer = new THREE.AnimationMixer(idleModel);
                if(gltf.animations.length) idleMixer.clipAction(gltf.animations[0]).play();
                playerGroup.add(idleModel);
                idleModel.visible = (currentState === 'idle');
            });

            fbxLoader.load('https://raygamix.github.io/Character%20.fbx', (fbx) => {
                walkModel = fbx;
                // Updated Scale: 16.0 (2x of previous 8.0)
                walkModel.scale.set(16, 16, 16); 
                walkModel.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
                walkMixer = new THREE.AnimationMixer(walkModel);
                if(fbx.animations.length) walkMixer.clipAction(fbx.animations[0]).play();
                playerGroup.add(walkModel);
                walkModel.visible = (currentState === 'walk');
            });

            fbxLoader.load('https://raygamix.github.io/Character%20Jumping.fbx', (fbx) => {
                jumpModel = fbx;
                // Updated Scale: 16.0 (2x of previous 8.0)
                jumpModel.scale.set(16, 16, 16);
                jumpModel.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
                jumpMixer = new THREE.AnimationMixer(jumpModel);
                if(fbx.animations.length) jumpMixer.clipAction(fbx.animations[0]).play();
                playerGroup.add(jumpModel);
                jumpModel.visible = (currentState === 'jump');
            });
        }

        function switchState(state) {
            if (state === currentState) return;
            currentState = state;
            if(idleModel) idleModel.visible = (state === 'idle');
            if(walkModel) walkModel.visible = (state === 'walk');
            if(jumpModel) jumpModel.visible = (state === 'jump');
        }

        function handleKey(code, isPressed) {
            switch(code) {
                case 'KeyS': moveForward = isPressed; break;
                case 'KeyW': moveBackward = isPressed; break;
                case 'KeyD': moveLeft = isPressed; break;
                case 'KeyA': moveRight = isPressed; break;
                case 'Space': if(isPressed && canJump) { velocity.y = JUMP_FORCE; canJump = false; } break;
            }
        }

        function onMouseMove(e) {
            if (document.pointerLockElement === document.body) {
                cameraAngleX -= e.movementX * 0.005;
                cameraAngleY = Math.max(0.1, Math.min(1.4, cameraAngleY + e.movementY * 0.005));
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1); 

            if (isPlaying && playerGroup) {
                platforms.forEach(p => {
                    p.timer += delta;
                    if (p.type === 'moving') p.mesh.position.x = p.originalX + Math.sin(p.timer * 2) * 9;
                    else if (p.type === 'spinning') p.mesh.rotation.y += delta * 2;
                    else if (p.type === 'disappearing') {
                        const alpha = (Math.sin(p.timer * 3) + 1) / 2;
                        p.mesh.material.opacity = alpha;
                        p.active = alpha > 0.3;
                    }
                });

                // Gravity Application
                if (!isAirWalk) {
                    velocity.y -= GRAVITY * delta;
                } else {
                    velocity.y = 0; 
                }
                
                playerGroup.position.y += velocity.y * delta;

                let onGround = false;
                // Collider center raised to match huge character
                playerCollider.setFromCenterAndSize(
                    new THREE.Vector3(playerGroup.position.x, playerGroup.position.y + 3.6, playerGroup.position.z),
                    colliderSize
                );
                
                // Collision Logic
                for (let p of platforms) {
                    if (!p.active) continue;
                    const platBox = new THREE.Box3().setFromObject(p.mesh);
                    if (playerCollider.intersectsBox(platBox)) {
                        // Land on top (adjusting tolerance for giant character)
                        if (velocity.y <= 0 && playerGroup.position.y >= platBox.max.y - 2.0) {
                            playerGroup.position.y = platBox.max.y; 
                            velocity.y = 0;
                            onGround = true;
                            break;
                        }
                    }
                }

                // Air Walk logic overrides onGround
                if (isAirWalk) onGround = true;

                // Checkpoint logic
                for (let cp of checkpoints) {
                    const cpBox = new THREE.Box3().setFromObject(cp.mesh);
                    if (playerCollider.intersectsBox(cpBox)) {
                        if (!cp.active) {
                            cp.active = true;
                            cp.mesh.material.color.setHex(0x00ff00);
                            lastCheckpointPos.copy(cp.mesh.position).y += 2;
                            currentLevel = cp.level;
                            document.getElementById('hud').innerText = `Level: ${currentLevel}`;
                        }
                        if (velocity.y <= 0 && playerGroup.position.y >= cpBox.max.y - 2.0) {
                            playerGroup.position.y = cpBox.max.y;
                            velocity.y = 0;
                            onGround = true;
                        }
                    }
                }
                
                canJump = onGround;

                // Death / God Mode check
                if (playerGroup.position.y < -50) {
                    if (isGodMode) {
                        playerGroup.position.y = 20; // Teleport back to safety height
                        velocity.y = 0;
                    } else {
                        playerGroup.position.copy(lastCheckpointPos);
                        velocity.set(0,0,0);
                    }
                }

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveLeft) - Number(moveRight);
                direction.normalize();

                const isMoving = (moveForward || moveBackward || moveLeft || moveRight);

                if (isMoving) {
                    const speed = (canJump || isAirWalk) ? PLAYER_SPEED : PLAYER_SPEED * AIR_CONTROL;
                    const angle = cameraAngleX + Math.atan2(direction.x, direction.z);
                    playerGroup.rotation.y = angle;
                    playerGroup.position.x += Math.sin(angle) * speed * delta;
                    playerGroup.position.z += Math.cos(angle) * speed * delta;
                }

                if (!canJump && !isAirWalk) {
                    switchState('jump');
                } else if (isMoving) {
                    switchState('walk');
                } else {
                    switchState('idle');
                }

                if (idleMixer) idleMixer.update(delta);
                if (walkMixer) walkMixer.update(delta);
                if (jumpMixer) jumpMixer.update(delta);

                const camDist = 32; // Pulled back significantly for giant models
                const targetCamX = playerGroup.position.x + Math.sin(cameraAngleX) * camDist * Math.cos(cameraAngleY);
                const targetCamZ = playerGroup.position.z + Math.cos(cameraAngleX) * camDist * Math.cos(cameraAngleY);
                const targetCamY = playerGroup.position.y + Math.sin(cameraAngleY) * camDist + 8.0;
                
                camera.position.lerp(new THREE.Vector3(targetCamX, targetCamY, targetCamZ), 0.1);
                // Camera looks higher up to match giant player height
                camera.lookAt(playerGroup.position.x, playerGroup.position.y + 6.0, playerGroup.position.z);
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
